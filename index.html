<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MineTheOre</title>
    <style>
        h1 { color: #ffffff; margin-bottom: 5px; }
        body {
            background-color: hsl(148, 20%, 10%);
            color: #aaaaaa;
            padding: 27px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            text-align: center;
        }
        canvas { border: 4px solid #333; cursor: pointer; background-color: #000; display: inline-block; }
        .stats { margin-bottom: 15px; font-size: 18px; color: #00ff88; }
        #leaderboard {
            margin-top: 30px;
            padding: 20px;
            border: 2px solid #333;
            display: inline-block;
            min-width: 300px;
            background: rgba(0,0,0,0.3);
        }
        .score-entry { display: flex; justify-content: space-between; padding: 8px 15px; border-bottom: 1px solid #222; }
        .name { color: #fff; font-weight: bold; }
        .score { color: #00ff88; }
        h3 { color: #00ff88; text-transform: uppercase; letter-spacing: 2px; }
        #highscore-anim {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: gold; color: #000;
            padding: 40px; border-radius: 20px;
            font-size: 30px; font-weight: bold; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="highscore-anim">🏆 NEW TOP 10! 🏆</div>
    <h1>MineTheOre</h1>
    <div class="stats">Level: <span id="level-num">1</span></div>
    
    <canvas id="GameCanvas" width="500" height="500"></canvas>

    <br>
    <div id="leaderboard">
        <h3>--- TOP 10 MINERS ---</h3>
        <div id="score-list">Checking connection...</div>
    </div>

    <script>
        const GITHUB_USER = "SillyWaffle-4";
        const REPO_NAME = "MineTheOre";
        const SCRAMBLED_KEY = "Z2hwX2g3NWkydG8xcFdpcmlhbXQzZUlsaUNzaUN2bDZBWjJDV1N5aA=="; 
        
        const FILE_PATH = "leaderboard.json";
        const AUTH = atob(SCRAMBLED_KEY); 
        const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${FILE_PATH}`;

        const canvas = document.getElementById("GameCanvas");
        const ctx = canvas.getContext("2d");
        const levelDisplay = document.getElementById("level-num");
        const highscoreBanner = document.getElementById("highscore-anim");

        let level = 1;
        let canClick = true;

        const luckyImg = new Image();
        luckyImg.src = 'LuckyBlock.jpg';
        
        // GAME START LOGIC
        luckyImg.onload = () => { drawBoard(); }; 
        // Force draw anyway after 1 second in case onload fails
        setTimeout(drawBoard, 1000); 

        loadLeaderboard();

        async function loadLeaderboard() {
            const list = document.getElementById("score-list");
            
            // Timeout Controller: Give up after 5 seconds
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);

            try {
                const res = await fetch(`https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/${FILE_PATH}?t=${Date.now()}`, { signal: controller.signal });
                clearTimeout(timeoutId);

                if (!res.ok) throw new Error("404");

                const data = await res.json();
                if (!data.scores || data.scores.length === 0) {
                    list.innerText = "No scores yet!";
                } else {
                    list.innerHTML = data.scores
                        .map((s, i) => `<div class="score-entry"><span class="name">${i+1}. ${s.name}</span><span class="score">Lvl ${s.score}</span></div>`)
                        .join('');
                }
            } catch (e) {
                list.innerText = "Leaderboard Offline";
                console.log("Load failed, playing in offline mode.");
            }
        }

        async function saveScore(playerName, finalLevel) {
            const list = document.getElementById("score-list");
            list.innerText = "Syncing...";
            try {
                const res = await fetch(API_URL, { headers: { "Authorization": `token ${AUTH}` } });
                const data = await res.json();
                const content = JSON.parse(atob(data.content));

                content.scores.push({ name: playerName, score: finalLevel });
                content.scores.sort((a, b) => b.score - a.score);
                const topTen = content.scores.slice(0, 10);

                await fetch(API_URL, {
                    method: "PUT",
                    headers: { "Authorization": `token ${AUTH}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: `Score: ${playerName}`,
                        content: btoa(JSON.stringify({ scores: topTen }, null, 2)),
                        sha: data.sha
                    })
                });
                loadLeaderboard();
            } catch (err) {
                list.innerText = "Sync Error";
            }
        }

        function drawBoard() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, 500, 500);
            if (luckyImg.complete) {
                ctx.drawImage(luckyImg, 0, 0, 248, 248);
                ctx.drawImage(luckyImg, 252, 0, 248, 248);
                ctx.drawImage(luckyImg, 0, 252, 248, 248);
                ctx.drawImage(luckyImg, 252, 252, 248, 248);
            }
            canClick = true;
        }

        canvas.addEventListener("click", () => {
            if (!canClick) return;
            canClick = false; 
            
            // Logic for rolling
            let winChance = level === 1 ? 0.9 : (70 - level) / 100;
            if (Math.random() <= winChance) {
                level++;
                levelDisplay.innerText = level;
                drawBoard();
            } else {
                handleGameOver();
            }
        });

        function handleGameOver() {
            const finalScore = level;
            highscoreBanner.style.display = "block";
            setTimeout(() => {
                highscoreBanner.style.display = "none";
                const name = prompt("Enter name for Top 10:");
                if (name) saveScore(name.substring(0, 12), finalScore);
                level = 1;
                levelDisplay.innerText = level;
                drawBoard();
            }, 1000);
        }
    </script>
</body>
</html>
