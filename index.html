<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MineTheOre</title>
    <style>
        h1 { color: #ffffff; margin-bottom: 5px; }
        body {
            background-color: hsl(148, 20%, 10%);
            color: #aaaaaa;
            padding: 20px;
            font-family: 'Courier New', monospace;
            text-align: center;
        }
        canvas { border: 4px solid #333; cursor: pointer; background-color: #000; }
        #leaderboard {
            margin-top: 20px;
            padding: 15px;
            border: 2px solid #333;
            display: inline-block;
            min-width: 320px;
            background: rgba(0,0,0,0.5);
        }
        .score-row { display: flex; justify-content: space-between; padding: 5px 10px; border-bottom: 1px solid #222; }
        .name { color: #fff; }
        .val { color: #00ff88; }
    </style>
</head>
<body>

    <h1>MineTheOre</h1>
    <div style="margin-bottom:10px; color:#00ff88;">Level: <span id="level-num">1</span></div>
    
    <canvas id="GameCanvas" width="500" height="500"></canvas>

    <br>
    <div id="leaderboard">
        <h3 style="color:#00ff88; margin-top:0;">--- TOP 10 MINERS ---</h3>
        <div id="score-list">Checking GitHub...</div>
    </div>

    <script>
        // 1. CONFIG - MAKE SURE THESE MATCH YOUR GITHUB EXACTLY
        const GITHUB_USER = "SillyWaffle-4";
        const REPO_NAME = "MineTheOre";
        const FILE_PATH = "leaderboard.json";
        // The Base64 string of your ghp_ token
        const SCRAMBLED_KEY = "Z2hwX2g3NWkydG8xcFdpcmlhbXQzZUlsaUNzaUN2bDZBWjJDV1N5aA=="; 
        
        const AUTH = atob(SCRAMBLED_KEY);
        const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${FILE_PATH}`;

        const canvas = document.getElementById("GameCanvas");
        const ctx = canvas.getContext("2d");
        const luckyImg = new Image();
        luckyImg.src = 'LuckyBlock.jpg';

        let level = 1;
        let canClick = true;

        // 2. IMMEDIATE START (Fixes the black screen)
        function drawBoard() {
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, 500, 500);
            if (luckyImg.complete) {
                ctx.drawImage(luckyImg, 0, 0, 248, 248);
                ctx.drawImage(luckyImg, 252, 0, 248, 248);
                ctx.drawImage(luckyImg, 0, 252, 248, 248);
                ctx.drawImage(luckyImg, 252, 252, 248, 248);
            }
            canClick = true;
        }
        
        luckyImg.onload = drawBoard;
        setTimeout(drawBoard, 500); // Draw even if image fails

        // 3. ROBUST LOADER
        async function loadLeaderboard() {
            const list = document.getElementById("score-list");
            try {
                // We use a timestamp to bypass GitHub's cache
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${FILE_PATH}?t=${Date.now()}`, {
                    headers: { "Authorization": `token ${AUTH}` }
                });

                if (!response.ok) throw new Error("File not found");

                const fileData = await response.json();
                const content = JSON.parse(atob(fileData.content));

                if (!content.scores || content.scores.length === 0) {
                    list.innerText = "No scores yet!";
                } else {
                    list.innerHTML = content.scores
                        .map((s, i) => `<div class="score-row"><span>${i+1}. ${s.name}</span><span class="val">Lvl ${s.score}</span></div>`)
                        .join('');
                }
            } catch (e) {
                console.error(e);
                list.innerText = "Leaderboard Offline";
            }
        }

        loadLeaderboard();

        // 4. GAME INTERACTION
        canvas.addEventListener("click", () => {
            if (!canClick) return;
            canClick = false;
            
            // Simple logic: 80% chance to pass Level 1, getting harder
            let chance = level === 1 ? 0.8 : (70 - level) / 100;
            if (Math.random() <= chance) {
                level++;
                document.getElementById("level-num").innerText = level;
                drawBoard();
            } else {
                const name = prompt("BOOM! Game Over. Level: " + level + "\nEnter name for leaderboard:");
                if (name) saveScore(name, level);
                level = 1;
                document.getElementById("level-num").innerText = level;
                drawBoard();
            }
        });

        async function saveScore(name, score) {
            const list = document.getElementById("score-list");
            list.innerText = "Syncing...";
            try {
                // Get the current file (and its SHA)
                const res = await fetch(API_URL, { headers: { "Authorization": `token ${AUTH}` } });
                const fileData = await res.json();
                const current = JSON.parse(atob(fileData.content));

                // Add new score
                current.scores.push({ name: name.substring(0,10), score: score });
                current.scores.sort((a, b) => b.score - a.score);
                const top10 = current.scores.slice(0, 10);

                // Upload back
                await fetch(API_URL, {
                    method: "PUT",
                    headers: { "Authorization": `token ${AUTH}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: "Update Leaderboard",
                        content: btoa(JSON.stringify({ scores: top10 }, null, 2)),
                        sha: fileData.sha
                    })
                });
                loadLeaderboard();
            } catch (e) {
                list.innerText = "Sync Error";
            }
        }
    </script>
</body>
</html>
